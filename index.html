<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strong Visualizer Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .editor { width: 100%; max-width: 500px; background: #222; padding: 20px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; margin-bottom: 15px; font-size: 24px; }
        textarea { width: 100%; height: 120px; background: #333; border: 2px solid #444; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; resize: none; font-size: 16px; outline: none; }
        .file-label { display: block; background: #444; color: white; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 15px; border: 2px dashed #666; font-size: 16px; }
        input[type="file"] { display: none; }
        .btn { background: #ff4757; color: white; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; font-size: 18px; -webkit-appearance: none; margin-bottom: 10px; }
        .btn-sub { background: #444; font-size: 16px; }
        canvas { max-width: 100%; border-radius: 15px; display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .save-btn { background: #2f3542; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="editor">
    <h2>Strong Visualizer</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    <button class="btn btn-sub" onclick="pasteLog()">📋 클립보드 붙여넣기</button>
    
    <label for="imageInput" class="file-label" id="fileLabel">🖼️ 사진 선택하기</label>
    <input type="file" id="imageInput" accept="image/*">
    
    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<canvas id="canvas"></canvas>
<button id="downloadBtn" class="btn save-btn" onclick="download()">이미지 저장하기</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    document.getElementById('imageInput').onchange = function() {
        document.getElementById('fileLabel').innerText = "✅ 사진 선택 완료";
    };

    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) document.getElementById('logInput').value = text;
        } catch (err) {
            alert("붙여넣기 권한이 필요합니다.");
        }
    }

    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        
        if (!rawText || !file) return alert("텍스트와 사진을 모두 넣어주세요!");

        const photoTime = new Date(file.lastModified);
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== "");
        const workoutTitle = lines[0]; 
        const dateTime = lines[1];
        
        const timeMatch = dateTime.match(/(오전|오후)\s*\d+:\d+/);
        if (!timeMatch) return alert("로그 형식이 올바르지 않습니다.");
        
        const start = parseTimeString(timeMatch[0]);
        let endTotal = photoTime.getHours() * 60 + photoTime.getMinutes();
        let startTotal = start.hours * 60 + start.minutes;
        if (endTotal < startTotal) endTotal += 1440;
        const diff = endTotal - startTotal;
        const duration = `${Math.floor(diff / 60)}h ${diff % 60}m`;

        let totalSets = 0, exerciseList = [], currentExercise = null;
        
        lines.forEach((line, idx) => {
            if (idx === 1) return;
            
            // 세트 패턴 검사 (숫자나 F/D로 시작하는 세트 기록)
            const setMatch = line.match(/^(세트\s*\d+|F|D|Set\s*\d+):/i);
            
            if (setMatch) { 
                totalSets++; 
                if (currentExercise) currentExercise.sets++; 
            }
            else if (line.startsWith("W:") || line.startsWith("http") || line.startsWith("Note:") || line.startsWith("메모:")) {
                return;
            }
            // 종목 이름 판별: 숫자로 시작하지 않고, 세트/kg 등의 단어가 없는 경우
            else if (isNaN(line[0]) && !line.includes("세트") && !line.includes("kg") && line !== workoutTitle && line !== dateTime) {
                // 소문자로 시작하면 보통 메모이므로 제외
                if (/^[a-z]/.test(line)) return; 
                
                currentExercise = { name: line, sets: 0 };
                exerciseList.push(currentExercise);
            }
        });

        // [핵심 필터] 세트가 1개 이상 기록된 종목만 남김 (이걸로 plateload 같은 빈 종목 컷!)
        exerciseList = exerciseList.filter(ex => ex.sets > 0);

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                document.fonts.ready.then(function() {
                    draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList);
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080;
        canvas.height = 1350; 
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const cardH = canvas.height * 0.55;
        const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(0.3, "rgba(0,0,0,0.7)");
        grad.addColorStop(1, "rgba(0,0,0,0.95)"); 
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

        const margin = 70;
        const colW = (canvas.width - margin * 2) / 2 - 30;
        const rowHeight = 70;
        const bottomY = canvas.height - 180; 
        const half = Math.ceil(exerciseList.length / 2);

        exerciseList.forEach((ex, i) => {
            let isRightCol = i >= half;
            let rowIdx = isRightCol ? i - half : i;
            const totalRowsInCol = isRightCol ? (exerciseList.length - half) : half;
            let x = margin + (isRightCol ? colW + 60 : 0);
            let y = bottomY - (totalRowsInCol - 1 - rowIdx) * rowHeight;

            ctx.textAlign = "left";
            ctx.fillStyle = "white";
            ctx.font = "700 36px 'Inter'";
            let name = ex.name;
            const maxW = colW - 150; 
            if (ctx.measureText(name).width > maxW) {
                while (ctx.measureText(name + "..").width > maxW) { name = name.slice(0, -1); }
                name += "..";
            }
            ctx.fillText(name, x, y);

            ctx.textAlign = "right";
            ctx.fillStyle = "#ff4757";
            const circleFontSize = ex.sets > 5 ? 26 : 36;
            ctx.font = "700 " + circleFontSize + "px 'Inter'";
            ctx.fillText("ㅇ".repeat(ex.sets), x + colW, y);
        });

        const maxRows = Math.max(half, exerciseList.length - half);
        const listTopY = bottomY - (maxRows - 1) * rowHeight;
        const summaryY = listTopY - 110; 

        ctx.textAlign = "center";
        ctx.fillStyle = "#ccc";
        ctx.font = "400 32px 'Inter'";
        ctx.fillText(dateTime + "  |  " + duration + "  |  TOTAL " + totalSets + " SETS", canvas.width / 2, summaryY);

        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 2;
        ctx.beginPath(); 
        ctx.moveTo(margin, summaryY + 45); 
        ctx.lineTo(canvas.width - margin, summaryY + 45); 
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = "#ff4757";
        ctx.font = "700 85px 'Archivo Black'";
        ctx.fillText(workoutTitle.toUpperCase(), canvas.width / 2, canvas.height - 45);

        canvas.style.display = "block";
        document.getElementById('downloadBtn').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function download() {
        const dataURL = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'workout_done.png';
        link.href = dataURL;
        link.click();
    }
</script>
</body>
</html>
