<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strong Share Image 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; -webkit-user-select: none; }
        .editor { width: 100%; max-width: 500px; background: #222; padding: 20px; border-radius: 20px; box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; font-size: 22px; margin-top: 0; }
        textarea { width: 100%; height: 100px; background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; resize: none; outline: none; -webkit-user-select: text; }
        .btn { background: #ff4757; color: white; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 10px; -webkit-appearance: none; }
        .btn-sub { background: #444; }
        canvas { display: none; }
        .guide { color: #888; font-size: 13px; margin-top: 15px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="editor">
    <h2>Strong Share Image 2</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    <button class="btn btn-sub" onclick="pasteLog()">📋 클립보드 붙여넣기</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <button class="btn btn-sub" onclick="document.getElementById('imageInput').click()">🖼️ 사진 선택하기</button>
    <button class="btn" onclick="processWorkout()">이미지 생성 및 새창 열기</button>
    
    <div class="guide">
        💡 생성 버튼을 누르면 <b>새 탭</b>에 이미지가 뜹니다.<br>
        새 탭의 이미지를 <b>꾹 눌러서 [복사]</b> 하시면 끝!
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) document.getElementById('logInput').value = text;
        } catch (err) { alert("붙여넣기 권한이 필요합니다."); }
    }

    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const file = document.getElementById('imageInput').files[0];
        if (!rawText || !file) return alert("텍스트와 사진을 모두 넣어주세요!");

        const photoTime = new Date(file.lastModified);
        const paragraphs = rawText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p !== "");
        const headerLines = paragraphs[0].split('\n');
        const workoutTitle = headerLines[0];
        const dateTime = headerLines[1] || "";
        
        const timeMatch = dateTime.match(/(오전|오후)\s*\d+:\d+/);
        const start = timeMatch ? parseTimeString(timeMatch[0]) : {hours:0, minutes:0};
        let endTotal = photoTime.getHours() * 60 + photoTime.getMinutes();
        let startTotal = start.hours * 60 + start.minutes;
        if (endTotal < startTotal) endTotal += 1440;
        const diff = endTotal - startTotal;
        const duration = `${Math.floor(diff / 60)}h ${diff % 60}m`;

        let totalSets = 0, exerciseList = [];

        paragraphs.slice(1).forEach(para => {
            const lines = para.split('\n').map(l => l.trim());
            let foundName = "";
            let setsInPara = 0;
            let hasRecord = false;

            lines.forEach(line => {
                const isSet = /^(세트\s*\d+|W|F|D|Set\s*\d+):/i.test(line);
                if (isSet) {
                    hasRecord = true;
                    if (!line.toUpperCase().startsWith('W:')) {
                        totalSets++;
                        setsInPara++;
                    }
                } else if (!foundName && isNaN(line[0]) && !line.includes("kg") && !line.startsWith("http")) {
                    foundName = line;
                }
            });
            if (foundName && hasRecord) exerciseList.push({ name: foundName, sets: setsInPara });
        });

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                document.fonts.ready.then(() => {
                    draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList);
                    
                    // 핵심: 새 창에 이미지 띄우기
                    const dataUrl = canvas.toDataURL('image/png');
                    const newWindow = window.open();
                    if (newWindow) {
                        newWindow.document.write(`<img src="${dataUrl}" style="width:100%;" oncontextmenu="return true;">`);
                        newWindow.document.title = "꾹 눌러서 복사하세요";
                    } else {
                        alert("팝업이 차단되었습니다. 팝업 허용 후 다시 시도해주세요!");
                    }
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080; canvas.height = 1350; 
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const cardH = canvas.height * 0.55;
        const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(0.3, "rgba(0,0,0,0.7)");
        grad.addColorStop(1, "rgba(0,0,0,0.95)"); 
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

        const margin = 70;
        const colW = (canvas.width - margin * 2) / 2 - 30;
        const rowHeight = 70;
        const bottomY = canvas.height - 180; 
        const half = Math.ceil(exerciseList.length / 2);

        exerciseList.forEach((ex, i) => {
            let isRightCol = i >= half;
            let rowIdx = isRightCol ? i - half : i;
            const totalRowsInCol = isRightCol ? (exerciseList.length - half) : half;
            let x = margin + (isRightCol ? colW + 60 : 0);
            let y = bottomY - (totalRowsInCol - 1 - rowIdx) * rowHeight;
            ctx.textAlign = "left"; ctx.fillStyle = "white"; ctx.font = "700 36px 'Inter'";
            let name = ex.name; const maxW = colW - 150; 
            if (ctx.measureText(name).width > maxW) {
                while (ctx.measureText(name + "..").width > maxW) { name = name.slice(0, -1); }
                name += "..";
            }
            ctx.fillText(name, x, y);
            ctx.textAlign = "right"; ctx.fillStyle = "#ff4757";
            ctx.font = "700 " + (ex.sets > 5 ? 26 : 36) + "px 'Inter'";
            ctx.fillText("ㅇ".repeat(ex.sets), x + colW, y);
        });

        const summaryY = bottomY - (Math.max(half, exerciseList.length - half) - 1) * rowHeight - 110; 
        ctx.textAlign = "center"; ctx.fillStyle = "#ccc"; ctx.font = "400 32px 'Inter'";
        ctx.fillText(dateTime + "  |  " + duration + "  |  TOTAL " + totalSets + " SETS", canvas.width / 2, summaryY);
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(margin, summaryY + 45); ctx.lineTo(canvas.width - margin, summaryY + 45); ctx.stroke();
        ctx.textAlign = "center"; ctx.fillStyle = "#ff4757"; ctx.font = "700 85px 'Archivo Black'";
        ctx.fillText(workoutTitle.toUpperCase(), canvas.width / 2, canvas.height - 45);
    }
</script>
</body>
</html>
