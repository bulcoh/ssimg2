<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Strong Insta-Share Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .editor { width: 100%; max-width: 500px; background: #222; padding: 25px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 30px; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; margin-bottom: 25px; }
        textarea { width: 100%; height: 120px; background: #333; border: none; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; resize: none; font-family: inherit; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="time"] { background: #333; border: none; color: #fff; padding: 10px; border-radius: 10px; flex: 1; }
        input[type="file"] { margin-bottom: 25px; width: 100%; }
        canvas { max-width: 100%; border-radius: 15px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #fff; color: #000; padding: 13px 30px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; font-size: 16px; }
        .btn:hover { background: #ddd; transform: scale(1.02); }
        .save-btn { background: #ff4757; color: white; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="editor">
    <h2>📸 Strong Insta-Share</h2>
    <p>1. 로그 텍스트를 붙여넣으세요</p>
    <textarea id="logInput" placeholder="Strong 로그를 붙여넣으세요..."></textarea>
    
    <p>2. 운동 종료 시간을 입력하세요 (시간 계산용)</p>
    <div class="input-group">
        <input type="time" id="endTimeInput" value="18:00">
    </div>
    
    <p>3. 배경 사진을 선택하세요</p>
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<canvas id="canvas"></canvas>
<button id="downloadBtn" class="btn save-btn" onclick="download()">이미지 저장하기</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function parseTimeString(timeStr) {
        // "오후 3:58" 형태를 24시간 형식 "15:58"로 변환
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function calculateDuration(startStr, endStr) {
        // 운동 지속 시간 계산 (예: "1h 20m")
        const start = parseTimeString(startStr);
        const endParts = endStr.split(':');
        const end = { hours: parseInt(endParts[0]), minutes: parseInt(endParts[1]) };

        if (!start || !end) return "Time Error";

        let startMinutes = start.hours * 60 + start.minutes;
        let endMinutes = end.hours * 60 + end.minutes;

        if (endMinutes < startMinutes) endMinutes += 24 * 60; // 다음날로 넘어간 경우

        const diff = endMinutes - startMinutes;
        const h = Math.floor(diff / 60);
        const m = diff % 60;

        return `${h}h ${m}m`;
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const endTime = document.getElementById('endTimeInput').value;
        const file = document.getElementById('imageInput').files[0];
        if (!rawText || !file) return alert("텍스트와 사진을 넣어주세요!");

        // --- 데이터 파싱 로직 ---
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== "");
        const title = lines[0]; // 첫 줄: 루틴 이름
        const dateTime = lines[1]; // 둘째 줄: 날짜/시간
        const startTimeStr = dateTime.match(/(오전|오후)\s*\d+:\d+/)[0]; // 시작 시간 추출

        const workoutDuration = calculateDuration(startTimeStr, endTime); // 지속 시간 계산

        let totalSets = 0;
        let exerciseList = [];
        let currentExercise = null;

        lines.forEach((line, index) => {
            // 날짜 줄 패스
            if (index === 1) return;

            // 세트 정보 (세트 n: 또는 F:)
            const setMatch = line.match(/^(세트\s*\d+|F):/);
            if (setMatch) {
                totalSets++;
                if (currentExercise) currentExercise.sets++;
            } 
            // 워밍업(W:), 하단 링크, 빈 줄 무시
            else if (line.startsWith("W:") || line.startsWith("http") || line.trim() === "") {
                return; 
            }
            // 새로운 운동 종목명 (영어/한글/괄호 포함, 메모는 제외)
            else if (isNaN(line[0]) && !line.includes("세트") && !line.includes("kg") && line !== title && line !== dateTime) {
                // 메모 무시 로직: 소문자로 시작하거나 한글 조사가 붙지 않은 짧은 문장은 메모로 간주
                if (/^[a-z]/.test(line)) return; 

                currentExercise = { name: line, sets: 0 };
                exerciseList.push(currentExercise);
            }
        });

        // --- 이미지 합성 로직 ---
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = 1080; // 인스타 최적화 가로 해상도
                canvas.height = 1350; // 인스타 4:5 비율 세로 해상도 (사진을 중앙에 배치)
                canvas.style.display = "block";

                // 배경 채우기 (어두운 배경)
                ctx.fillStyle = "#111";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 사진을 중앙에 비율 맞춰 그리기
                const imgRatio = img.width / img.height;
                const canvasRatio = canvas.width / (canvas.height * 0.7); // 사진 영역 비율 (상단 70%)
                let drawWidth, drawHeight, drawX, drawY;

                if (imgRatio > canvasRatio) {
                    // 사진이 더 가로로 긴 경우
                    drawHeight = canvas.height * 0.7;
                    drawWidth = drawHeight * imgRatio;
                    drawX = (canvas.width - drawWidth) / 2;
                    drawY = 0;
                } else {
                    // 사진이 더 세로로 긴 경우
                    drawWidth = canvas.width;
                    drawHeight = drawWidth / imgRatio;
                    drawX = 0;
                    drawY = (canvas.height * 0.7 - drawHeight) / 2;
                }
                ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);

                // 하단 그라데이션 카드 영역 (사진 하단 30%)
                const cardHeight = canvas.height * 0.35; // 약간 넉넉하게
                const grad = ctx.createLinearGradient(0, canvas.height - cardHeight, 0, canvas.height);
                grad.addColorStop(0, "rgba(0,0,0,0)"); // 사진 영역 경계는 투명하게
                grad.addColorStop(0.3, "rgba(0,0,0,0.85)"); // 급격히 어두워짐
                grad.addColorStop(1, "rgba(0,0,0,1)"); // 맨 하단은 완전 검은색
                ctx.fillStyle = grad;
                ctx.fillRect(0, canvas.height - cardHeight, canvas.width, cardHeight);

                // 텍스트 그리기 설정
                const margin = 60;
                let currentY = canvas.height - cardHeight + 80;

                // 상단 요약 바 (DATE | TIME | SETS)
                ctx.fillStyle = "#aaa";
                ctx.font = "400 28px 'Inter'";
                const summaryText = `${dateTime.split(' ')[0]} ${dateTime.split(' ')[1]}  |  ${workoutDuration}  |  TOTAL ${totalSets} SETS`;
                const textWidth = ctx.measureText(summaryText).width;
                ctx.fillText(summaryText, (canvas.width - textWidth) / 2, currentY); // 중앙 정렬

                currentY += 60;
                // 구분선
                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 2;
                ctx.moveTo(margin, currentY);
                ctx.lineTo(canvas.width - margin, currentY);
                ctx.stroke();

                currentY += 80;
                // 하단 운동 리스트 (2열 배치로 압축)
                const colWidth = (canvas.width - margin * 2) / 2;
                let colX = margin;
                exerciseList.forEach((ex, index) => {
                    if (ex.sets === 0) return; // 세트 없는 종목 제외
                    
                    if (index === Math.ceil(exerciseList.length / 2)) {
                        // 2열로 변경
                        colX = margin + colWidth + 40;
                        currentY = canvas.height - cardHeight + 80 + 140; // 다시 상단으로
                    }

                    // 종목명
                    ctx.fillStyle = "white";
                    ctx.font = "700 38px 'Inter'";
                    const truncatedName = ex.name.length > 20 ? ex.name.substring(0, 18) + '..' : ex.name;
                    ctx.fillText(truncatedName, colX, currentY);
                    
                    // 세트수 (ㅇㅇㅇ) - 빨간색 포인트
                    ctx.fillStyle = "#ff4757";
                    ctx.font = "700 38px 'Inter'"; // 원(ㅇ)의 크기를 맞추기 위해 같은 폰트 사용
                    const nameWidth = ctx.measureText(truncatedName).width;
                    const circles = "ㅇ".repeat(ex.sets); // 세트수만큼 'ㅇ' 반복
                    ctx.fillText(circles, colX + nameWidth + 15, currentY);
                    
                    currentY += 60;
                });

                document.getElementById('downloadBtn').style.display = "block";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'workout_insta.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
