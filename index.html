<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Strong Insta-Share v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .editor { width: 100%; max-width: 500px; background: #222; padding: 25px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 20px; box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; }
        textarea { width: 100%; height: 120px; background: #333; border: none; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; resize: none; }
        
        /* 파일 선택 및 버튼 UI 강화 */
        .file-label { display: block; background: #444; color: white; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 15px; border: 2px dashed #666; font-size: 18px; }
        .file-label:hover { background: #555; }
        input[type="file"] { display: none; }
        
        .btn { background: #ff4757; color: white; padding: 20px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; font-size: 20px; }
        .btn:hover { background: #ff6b81; transform: translateY(-2px); }
        
        canvas { max-width: 100%; border-radius: 15px; display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .save-btn { background: #2f3542; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="editor">
    <h2>📸 Strong Visualizer</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    
    <label for="imageInput" class="file-label">🖼️ 사진 선택하기 (터치!)</label>
    <input type="file" id="imageInput" accept="image/*">
    
    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<canvas id="canvas"></canvas>
<button id="downloadBtn" class="btn save-btn" onclick="download()">이미지 저장하기</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        
        if (!rawText || !file) return alert("텍스트와 사진을 넣어주세요!");

        // --- 3. 사진 메타데이터에서 종료 시간 추출 ---
        const photoTime = new Date(file.lastModified);
        const endHours = photoTime.getHours();
        const endMinutes = photoTime.getMinutes();

        // --- 데이터 파싱 ---
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== "");
        const title = lines[0];
        const dateTime = lines[1];
        const startTimeStr = dateTime.match(/(오전|오후)\s*\d+:\d+/)[0];
        const start = parseTimeString(startTimeStr);

        // 시간 계산
        let startTotal = start.hours * 60 + start.minutes;
        let endTotal = endHours * 60 + endMinutes;
        if (endTotal < startTotal) endTotal += 1440;
        const diff = endTotal - startTotal;
        const duration = `${Math.floor(diff / 60)}h ${diff % 60}m`;

        let totalSets = 0;
        let exerciseList = [];
        let currentExercise = null;

        lines.forEach((line, idx) => {
            if (idx === 1) return;
            const setMatch = line.match(/^(세트\s*\d+|F):/);
            if (setMatch) {
                totalSets++;
                if (currentExercise) currentExercise.sets++;
            } else if (line.startsWith("W:") || line.startsWith("http")) {
                return;
            } else if (isNaN(line[0]) && !line.includes("세트") && !line.includes("kg") && line !== title && line !== dateTime) {
                if (/^[a-z]/.test(line)) return;
                currentExercise = { name: line, sets: 0 };
                exerciseList.push(currentExercise);
            }
        });

        // --- 이미지 합성 ---
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = 1080;
                canvas.height = 1350;
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 사진 배치
                const ratio = img.width / img.height;
                const drawH = canvas.height * 0.75;
                const drawW = drawH * ratio;
                ctx.drawImage(img, (canvas.width - drawW) / 2, 0, drawW, drawH);

                // 하단 카드
                const cardH = canvas.height * 0.35;
                const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
                grad.addColorStop(0, "rgba(0,0,0,0)");
                grad.addColorStop(0.2, "rgba(0,0,0,0.95)");
                grad.addColorStop(1, "rgba(0,0,0,1)");
                ctx.fillStyle = grad;
                ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

                // --- 2. 중간 텍스트 가독성 (Shadow 추가) ---
                const margin = 60;
                let currentY = canvas.height - cardH + 80;
                ctx.textAlign = "center";
                ctx.fillStyle = "#fff";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 10;
                ctx.font = "700 30px 'Inter'";
                const summary = `${dateTime.split('요일')[0]}  |  ${duration}  |  TOTAL ${totalSets} SETS`;
                ctx.fillText(summary, canvas.width / 2, currentY);
                ctx.shadowBlur = 0; // 그림자 해제

                currentY += 50;
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.strokeRect(margin, currentY, canvas.width - (margin * 2), 1);

                // --- 1. 운동 리스트 (잘림 방지 및 2열) ---
                currentY += 80;
                ctx.textAlign = "left";
                const colW = (canvas.width - margin * 2) / 2;
                exerciseList.forEach((ex, i) => {
                    if (ex.sets === 0) return;
                    let x = margin + (i >= Math.ceil(exerciseList.length / 2) ? colW + 20 : 0);
                    let y = i >= Math.ceil(exerciseList.length / 2) ? 
                            (canvas.height - cardH + 210) + ((i - Math.ceil(exerciseList.length / 2)) * 60) : 
                            currentY + (i * 60);

                    ctx.fillStyle = "white";
                    ctx.font = "700 34px 'Inter'";
                    
                    // 텍스트 축약 (동그라미 공간 확보)
                    let displayName = ex.name;
                    const maxTextW = colW - 160; 
                    if (ctx.measureText(displayName).width > maxTextW) {
                        while (ctx.measureText(displayName + "..").width > maxTextW) {
                            displayName = displayName.slice(0, -1);
                        }
                        displayName += "..";
                    }
                    ctx.fillText(displayName, x, y);

                    // 동그라미 세트수
                    ctx.fillStyle = "#ff4757";
                    const circles = "ㅇ".repeat(ex.sets);
                    ctx.fillText(circles, x + ctx.measureText(displayName).width + 15, y);
                });

                canvas.style.display = "block";
                document.getElementById('downloadBtn').style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'strong_workout.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
