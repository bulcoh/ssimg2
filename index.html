<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Strong Share Final v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .editor { width: 100%; max-width: 500px; background: #222; padding: 25px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 20px; box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; background: #333; border: none; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-sizing: border-box; resize: none; }
        .file-label { display: block; background: #444; color: white; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 15px; border: 2px dashed #666; font-size: 18px; }
        input[type="file"] { display: none; }
        .btn { background: #ff4757; color: white; padding: 20px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; font-size: 20px; }
        canvas { max-width: 100%; border-radius: 15px; display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .save-btn { background: #2f3542; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="editor">
    <h2>📸 Strong Visualizer v4</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    <label for="imageInput" class="file-label">🖼️ 사진 선택하기</label>
    <input type="file" id="imageInput" accept="image/*">
    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<canvas id="canvas"></canvas>
<button id="downloadBtn" class="btn save-btn" onclick="download()">이미지 저장하기</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const fileInput = document.getElementById('imageInput');
        const file = fileInput.files[0];
        if (!rawText || !file) return alert("텍스트와 사진을 넣어주세요!");

        const photoTime = new Date(file.lastModified);
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l !== "");
        const title = lines[0];
        const dateTime = lines[1];
        const startTimeStr = dateTime.match(/(오전|오후)\s*\d+:\d+/)[0];
        const start = parseTimeString(startTimeStr);

        let endTotal = photoTime.getHours() * 60 + photoTime.getMinutes();
        let startTotal = start.hours * 60 + start.minutes;
        if (endTotal < startTotal) endTotal += 1440;
        const diff = endTotal - startTotal;
        const duration = `${Math.floor(diff / 60)}h ${diff % 60}m`;

        let totalSets = 0, exerciseList = [], currentExercise = null;
        lines.forEach((line, idx) => {
            if (idx === 1) return;
            const setMatch = line.match(/^(세트\s*\d+|F):/);
            if (setMatch) { totalSets++; if (currentExercise) currentExercise.sets++; }
            else if (line.startsWith("W:") || line.startsWith("http")) return;
            else if (isNaN(line[0]) && !line.includes("세트") && !line.includes("kg") && line !== title && line !== dateTime) {
                if (/^[a-z]/.test(line)) return;
                currentExercise = { name: line, sets: 0 };
                exerciseList.push(currentExercise);
            }
        });

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = 1080;
                canvas.height = 1350; 
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // 하단 오버레이 (Opacity 0.7로 강화 및 부드러운 그라데이션)
                const cardH = canvas.height * 0.45;
                const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
                grad.addColorStop(0, "rgba(0,0,0,0)");
                grad.addColorStop(0.4, "rgba(0,0,0,0.4)");
                grad.addColorStop(1, "rgba(0,0,0,0.9)"); // 0.5에서 0.7로 강화
                ctx.fillStyle = grad;
                ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

                const margin = 70;
                let currentY = canvas.height - cardH + 110;

                // 가운데 요약
                ctx.textAlign = "center";
                ctx.fillStyle = "#888";
                ctx.font = "400 32px 'Inter'";
                const summary = `${dateTime.split('요일')[0]}  |  ${duration}  |  TOTAL ${totalSets} SETS`;
                ctx.fillText(summary, canvas.width / 2, currentY);

                currentY += 45;
                ctx.strokeStyle = "rgba(255,255,255,0.9)";
                ctx.beginPath(); ctx.moveTo(margin, currentY); ctx.lineTo(canvas.width - margin, currentY); ctx.stroke();

                // 운동 리스트 (하단 여백 축소 배치)
                currentY += 80; 
                const colW = (canvas.width - margin * 2) / 2 - 30;
                exerciseList.forEach((ex, i) => {
                    if (ex.sets === 0) return;
                    let isRightCol = i >= Math.ceil(exerciseList.length / 2);
                    let x = margin + (isRightCol ? colW + 50 : 0);
                    // y 간격을 65에서 60으로 줄이고 하단으로 더 배치
                    let y = isRightCol ? (canvas.height - cardH + 235) + ((i - Math.ceil(exerciseList.length / 2)) * 60) : currentY + (i * 60);

                    ctx.textAlign = "left";
                    ctx.fillStyle = "white";
                    ctx.font = "700 36px 'Inter'";
                    
                    let name = ex.name;
                    const maxW = colW - 140; 
                    if (ctx.measureText(name).width > maxW) {
                        while (ctx.measureText(name + "..").width > maxW) { name = name.slice(0, -1); }
                        name += "..";
                    }
                    ctx.fillText(name, x, y);

                    ctx.textAlign = "right";
                    ctx.fillStyle = "#ff4757";
                    const circlesX = x + colW; 
                    ctx.fillText("ㅇ".repeat(ex.sets), circlesX, y);
                });

                canvas.style.display = "block";
                document.getElementById('downloadBtn').style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function download() {
        const link = document.createElement('a');
        link.download = 'workout_insta_final.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
