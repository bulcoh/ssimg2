<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSimage 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 아이폰에서 텍스트 선택(파란 바)이 안 뜨게 강제 설정 */
        * { -webkit-user-select: none; -webkit-touch-callout: none; }
        
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        .editor { width: 100%; max-width: 500px; background: #222; padding: 20px; border-radius: 20px; box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; font-size: 24px; margin-top: 0; }
        
        /* 입력창만 텍스트 선택이 가능하게 예외 처리 */
        textarea { 
            width: 100%; height: 100px; background: #333; border: 1px solid #444; color: #fff; 
            padding: 10px; border-radius: 10px; margin-bottom: 10px; resize: none; outline: none; box-sizing: border-box;
            -webkit-user-select: text; font-size: 16px;
        }
        
        .btn { background: #ff4757; color: white; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-bottom: 10px; -webkit-appearance: none; box-sizing: border-box; }
        .btn-sub { background: #444; font-size: 16px; }
        
        /* 사진 선택 완료 및 데이터 저장 완료 시 스타일 */
        .btn-done { background: #222 !important; color: #666 !important; border: 1px solid #444; opacity: 0.7; pointer-events: none; }
        
        /* 데이터 저장 버튼용 별도 디자인 */
        .btn-data { background: #2f3542; color: #ced4da; margin-top: 5px; display: none; }

        /* 이미지 출력 영역 */
        #resultContainer { width: 100%; max-width: 500px; display: none; margin-top: 20px; text-align: center; }
        
        #resultImage { 
            width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            -webkit-touch-callout: default !important; pointer-events: auto;
        }
        
        canvas { display: none; }
        .guide { color: #888; font-size: 13px; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="editor">
    <h2>SSimage 2</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    <button class="btn btn-sub" onclick="pasteLog()">📋 클립보드 붙여넣기</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <label for="imageInput" class="btn btn-sub" id="fileLabel" style="display: block; text-align: center;">
        🖼️ 사진 선택하기
    </label>
    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<div id="resultContainer">
    <img id="resultImage" alt="Result Workout Image">
    <button id="saveDataBtn" class="btn btn-data" onclick="downloadData()">📊 Scriptable 데이터 기록</button>
    <div class="guide">
        SHARE STRONG IMAGE V2
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    let currentDataFileName = ""; // 다운로드할 파일명을 담을 변수

    document.getElementById('imageInput').onchange = function() {
        const label = document.getElementById('fileLabel');
        label.innerText = "✅ 사진 선택 완료";
        label.classList.add('btn-done');
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultImg = document.getElementById('resultImage');
    const resultContainer = document.getElementById('resultContainer');

    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) document.getElementById('logInput').value = text;
        } catch (err) { alert("붙여넣기 권한이 필요합니다."); }
    }

    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const file = document.getElementById('imageInput').files[0];
        if (!rawText || !file) return alert("텍스트와 사진을 모두 넣어주세요!");

        const photoTime = new Date(file.lastModified);
        const paragraphs = rawText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p !== "");
        const headerLines = paragraphs[0].split('\n');
        const workoutTitle = headerLines[0];
        const dateTime = headerLines[1] || "";
        
        const timeMatch = dateTime.match(/(오전|오후)\s*\d+:\d+/);
        const start = timeMatch ? parseTimeString(timeMatch[0]) : {hours:0, minutes:0};
        
        // 파일용 날짜 추출 (YYYYMMDD)
        const dateParts = dateTime.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
        const fileDate = dateParts ? `${dateParts[1]}${dateParts[2].padStart(2, '0')}${dateParts[3].padStart(2, '0')}` : "00000000";

        let endTotal = photoTime.getHours() * 60 + photoTime.getMinutes();
        let startTotal = start.hours * 60 + start.minutes;
        if (endTotal < startTotal) endTotal += 1440;
        const diff = endTotal - startTotal; // 운동 시간 (분)
        const duration = `${Math.floor(diff / 60)}h ${diff % 60}m`;

        // Scriptable용 파일명 미리 저장
        currentDataFileName = `ssimg_${fileDate}_${diff}.txt`;

        let totalSets = 0, exerciseList = [];

        paragraphs.slice(1).forEach(para => {
            const lines = para.split('\n').map(l => l.trim());
            let foundName = "";
            let setsInPara = 0;
            let hasRecord = false;

            lines.forEach(line => {
                const isSet = /^(세트\s*\d+|W|F|D|Set\s*\d+):/i.test(line);
                if (isSet) {
                    hasRecord = true;
                    if (!line.toUpperCase().startsWith('W:')) {
                        totalSets++;
                        setsInPara++;
                    }
                } else if (!foundName && isNaN(line[0]) && !line.includes("kg") && !line.startsWith("http")) {
                    foundName = line;
                }
            });
            if (foundName && hasRecord) exerciseList.push({ name: foundName, sets: setsInPara });
        });

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                document.fonts.ready.then(() => {
                    draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList);
                    resultImg.src = canvas.toDataURL('image/png');
                    resultContainer.style.display = 'block';
                    
                    // 이미지 생성 시 데이터 저장 버튼 초기화 및 노출
                    const dataBtn = document.getElementById('saveDataBtn');
                    dataBtn.style.display = 'block';
                    dataBtn.innerText = "📊 Scriptable 데이터 기록";
                    dataBtn.classList.remove('btn-done');
                    dataBtn.onclick = downloadData;

                    window.scrollTo({ top: resultContainer.offsetTop, behavior: 'smooth' });
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // 0바이트 빈 파일 다운로드 함수
    function downloadData() {
        if (!currentDataFileName) return;
        
        const blob = new Blob([""], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = currentDataFileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        const btn = document.getElementById('saveDataBtn');
        btn.innerText = "✅ 기록 완료";
        btn.classList.add('btn-done');
    }

    function draw(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080; canvas.height = 1350; 
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const cardH = canvas.height * 0.55;
        const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(0.3, "rgba(0,0,0,0.5)");
        grad.addColorStop(1, "rgba(0,0,0,0.8)"); 
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

        const margin = 70;
        const colW = (canvas.width - margin * 2) / 2 - 30;
        const rowHeight = 70;
        const bottomY = canvas.height - 180; 
        const half = Math.ceil(exerciseList.length / 2);

        exerciseList.forEach((ex, i) => {
            let isRightCol = i >= half;
            let rowIdx = isRightCol ? i - half : i;
            const totalRowsInCol = isRightCol ? (exerciseList.length - half) : half;
            let x = margin + (isRightCol ? colW + 60 : 0);
            let y = bottomY - (totalRowsInCol - 1 - rowIdx) * rowHeight;
            ctx.textAlign = "left"; ctx.fillStyle = "white"; ctx.font = "700 36px 'Inter'";
            let name = ex.name; const maxW = colW - 150; 
            if (ctx.measureText(name).width > maxW) {
                while (ctx.measureText(name + "..").width > maxW) { name = name.slice(0, -1); }
                name += "..";
            }
            ctx.fillText(name, x, y);
            ctx.textAlign = "right"; ctx.fillStyle = "#ff4757";
            ctx.font = "700 " + (ex.sets > 5 ? 26 : 36) + "px 'Inter'";
            ctx.fillText("ㅇ".repeat(ex.sets), x + colW, y);
        });

        const summaryY = bottomY - (Math.max(half, exerciseList.length - half) - 1) * rowHeight - 110; 
        ctx.textAlign = "center"; ctx.fillStyle = "#ccc"; ctx.font = "400 32px 'Inter'";
        ctx.fillText(dateTime + "  |  " + duration + "  |  TOTAL " + totalSets + " SETS", canvas.width / 2, summaryY);
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(margin, summaryY + 45); ctx.lineTo(canvas.width - margin, summaryY + 45); ctx.stroke();
        ctx.textAlign = "center"; ctx.fillStyle = "#ff4757"; ctx.font = "700 85px 'Archivo Black'";
        ctx.fillText(workoutTitle.toUpperCase(), canvas.width / 2, canvas.height - 45);
    }
</script>
</body>
</html>
