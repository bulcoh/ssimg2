<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VKZBGY5ZVC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-VKZBGY5ZVC');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ssimg_v1.3_Final</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        :root { --cyan: #379FF1; --bg: #1B2129; }
        html, body { max-width: 100vw; overflow-x: hidden; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .wrapper { display: flex; flex-direction: row; gap: 20px; max-width: 1400px; width: 100%; padding: 10px; box-sizing: border-box; }
        .editor { flex: 1; background: #242c37; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; min-width: 350px; box-sizing: border-box; }
        textarea { height: 200px; background: #2b3441; border: none; color: white; padding: 15px; border-radius: 10px; resize: none; font-size: 13px; width: 100%; box-sizing: border-box; outline: none; }
        .preview { flex: 1; position: relative; display: flex; justify-content: center; align-items: flex-start; }
        canvas { background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 100%; height: auto !important; border-radius: 10px; border: 1px solid #333; touch-action: none; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
        button { background: var(--cyan); color: black; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; min-width: 100px; font-size: 15px; -webkit-appearance: none; }
        button.secondary { background: #323d4d; color: white; }
        .drop-zone { border: 2px dashed #555; padding: 25px; text-align: center; border-radius: 10px; color: #888; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .drop-zone.dragover { border-color: var(--cyan); color: var(--cyan); background: rgba(55, 159, 241, 0.1); }
        
        @media (max-width: 768px) {
            .wrapper { flex-direction: column !important; padding: 5px; }
            .editor { min-width: 0 !important; width: 100% !important; }
            .btn-group { display: grid; grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="editor">
        <div style="color:#666; font-weight:900; font-size:24px;">ssimg <span style="font-size: 14px; font-weight: normal; color: #555;">v1.3</span></div>
        <textarea id="strongData" placeholder="Strong 로그를 붙여넣으세요..."></textarea>
        
        <div class="btn-group">
            <button class="secondary" onclick="pasteLog()">📋 Paste</button>
            <button class="secondary" onclick="fitImage()">Fit</button>
            <button id="toggleMuscleBtn" onclick="toggleMuscle()">Muscle Man</button>
        </div>

        <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()">
            🖼️ Drop Photo (or Click)
        </div>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        
        <button onclick="downloadImage()" style="font-size: 18px;">SAVE IMAGE</button>
        <p style="text-align: center; color: #666; font-size: 12px;">* 1 finger: Move / 2 fingers: Zoom</p>
    </div>

    <div class="preview">
        <canvas id="mainCanvas" width="1035" height="1374"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    let userImg = null, imgX = 0, imgY = 145, imgScale = 1.0;
    let isDragging = false, showMuscle = true;
    let startX, startY, startImgX, startImgY, startScale, initialDist = 0;
    let serverMapping = {}, userMapping = JSON.parse(localStorage.getItem('ssimg_userMapping')) || {};
    let photoDateTime = null;
    const imgCache = {};
    const noteKeywords = ['note', 'notiz', 'nota', 'remarque', 'ノート', 'примечание', '备注', '備註'];
    let currentDrawId = 0;
    let fixedRectLeft = 0, fixedRectTop = 0, fixedScaleS = 1;

    // 클립보드 붙여넣기 함수
    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                document.getElementById('strongData').value = text;
                draw();
            }
        } catch (err) {
            alert("사파리/브라우저의 붙여넣기 권한을 허용해주세요.");
        }
    }

    // 파일 처리
    function handleFile(file) {
        if (!file) return;
        EXIF.getData(file, function() {
            const dt = EXIF.getTag(this, "DateTimeOriginal");
            photoDateTime = dt ? new Date(dt.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1/$2/$3')) : new Date(file.lastModified);
            draw();
        });
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { userImg = img; fitImage(); setTimeout(updateCanvasRect, 100); draw(); };
        img.src = url;
    }
    document.getElementById('fileInput').onchange = e => handleFile(e.target.files[0]);

    // 캔버스 위치 업데이트
    function updateCanvasRect() {
        const rect = canvas.getBoundingClientRect();
        if (rect.width > 0) {
            fixedRectLeft = rect.left + window.scrollX;
            fixedRectTop = rect.top + window.scrollY;
            fixedScaleS = 1035 / rect.width;
        }
    }

    function loadImg(src) {
        if (imgCache[src]) return Promise.resolve(imgCache[src]);
        return new Promise(resolve => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => { imgCache[src] = img; resolve(img); };
            img.onerror = () => resolve(null);
            img.src = src;
        });
    }

    // 이미지 저장
    function downloadImage() {
        const data = parseData();
        const n = new Date();
        const fileName = `ssimg_${n.getTime()}.jpg`;
        canvas.toBlob((blob) => {
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
        }, 'image/jpeg', 0.9);
    }

    // [핵심 로직] 데이터 파싱 (메모 무시 기능 강화)
    function parseData() {
        const text = document.getElementById('strongData').value.trim();
        if(!text) return { title: "WORKOUT", date: "Date", exercises: [], totalSets: 0, appIcon: null, startTime: null, exDetails: [] };
        
        const paragraphs = text.split(/\n\s*\n/);
        const header = (paragraphs[0] || "").split('\n');
        let title = header[0] || "WORKOUT";
        let dateLine = header[1] || "";
        
        // 시간 파싱 로직
        let startTime = null;
        const timeMatch = dateLine.match(/(\d{1,2}:\d{2})/);
        const ampmMatch = dateLine.match(/(AM|PM|오전|오후)/i);
        if (timeMatch) {
            let [hh, mm] = timeMatch[1].split(':').map(Number);
            const ampm = ampmMatch ? ampmMatch[1].toUpperCase() : "";
            if ((ampm === 'PM' || ampm === '오후') && hh < 12) hh += 12;
            if ((ampm === 'AM' || ampm === '오전') && hh === 12) hh = 0;
            startTime = new Date();
            startTime.setHours(hh, mm, 0, 0);
        }

        let totalSets = 0, exDetails = [], appIcon = null;
        
        // 앱 아이콘 체크
        text.split('\n').forEach(l => {
            if (l.includes('strong')) appIcon = 'strong.png';
            else if (l.includes('hevy')) appIcon = 'hevy.png';
        });

        // 운동 문단 분석
        paragraphs.slice(1).forEach(p => {
            const pLines = p.trim().split('\n');
            if (pLines.length < 2) return;

            const nameLine = pLines[0].trim();
            if (nameLine.startsWith('http') || nameLine.startsWith('"')) return;

            let currentExSets = 0;
            let hasValidSet = false;

            pLines.slice(1).forEach(l => {
                const line = l.toLowerCase().trim();
                // 세트 패턴: 숫자로 시작하고 : 혹은 x가 붙거나, Set/세트 단어 포함
                const isSetPattern = /^(set|세트)?\s*\d+\s*[:x]/i.test(line);
                const isFailure = line.startsWith('f:');
                const isDrop = line.startsWith('d:');
                const isWarmup = line.startsWith('w:');

                if (!isWarmup && (isSetPattern || isFailure || isDrop)) {
                    totalSets++;
                    currentExSets++;
                    hasValidSet = true;
                }
            });

            if (hasValidSet) {
                const cleanName = nameLine.split('(')[0].trim();
                exDetails.push({ name: cleanName, sets: currentExSets });
            }
        });

        return { title, date: dateLine, totalSets, appIcon, startTime, exDetails };
    }

    // 그리기 함수
    async function draw() {
        const drawId = ++currentDrawId;
        const data = parseData();
        
        // 사파리 대응 폰트 대기
        await document.fonts.ready;
        const frameImg = await loadImg(showMuscle ? 'polaroid.png' : 'polaroid_noman.png');
        if (drawId !== currentDrawId) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 사진 그리기
        if (userImg) {
            ctx.save();
            ctx.beginPath(); ctx.rect(0, 145, 1035, 1085); ctx.clip();
            ctx.drawImage(userImg, imgX, imgY, userImg.width * imgScale, userImg.height * imgScale);
            ctx.restore();
        }

        if (frameImg) ctx.drawImage(frameImg, 0, 0, 1035, 1374);

        // 텍스트 렌더링
        renderText(ctx, data);
    }

    function renderText(ctx, data) {
        const font = "Pretendard, -apple-system, sans-serif";
        
        // 1. 날짜 및 세트 정보
        ctx.textAlign = "left";
        ctx.fillStyle = "#7f8c99"; ctx.font = `34px ${font}`;
        ctx.fillText(data.date, 38, 145);
        
        ctx.fillStyle = "#379FF1"; ctx.font = `bold 24px ${font}`;
        ctx.fillText(`TOTAL SETS : ${data.totalSets}`, 38, 182);

        // 2. 운동 리스트 (역순 출력)
        const filtered = data.exDetails;
        let fs = filtered.length > 12 ? Math.max(22, 32 - (filtered.length - 12) * 2) : 32;
        ctx.font = `bold ${fs}px ${font}`;
        
        // 타이틀과 겹치지 않게 하단 여백 설정 (180)
        const listBottomY = 1200 - 60; 

        filtered.slice().reverse().forEach((ex, i) => {
            const py = listBottomY - (i * (fs + 12));
            const displayText = `${ex.name} ${"●".repeat(ex.sets)}`;
            ctx.strokeStyle = "black"; ctx.lineWidth = 6; ctx.strokeText(displayText, 45, py);
            ctx.fillStyle = "white"; ctx.fillText(displayText, 45, py);
        });

        // 3. [신규] 하단 메인 타이틀 (PUSH#1)
        ctx.textAlign = "center";
        ctx.fillStyle = "#379FF1";
        ctx.font = `900 100px ${font}`;
        ctx.fillText(data.title.toUpperCase(), canvas.width / 2, 1330);
    }

    function toggleMuscle() { showMuscle = !showMuscle; draw(); }
    function fitImage() { if(userImg){ imgScale = 1035/userImg.width; imgX=0; imgY=145; draw(); } }

    // 마우스/터치 이벤트 (생략 없이 v1.2 로직 그대로 유지)
    canvas.onmousedown = e => {
        if (!userImg) return;
        updateCanvasRect(); isDragging = true;
        startX = (e.clientX + window.scrollX - fixedRectLeft) * fixedScaleS;
        startY = (e.clientY + window.scrollY - fixedRectTop) * fixedScaleS;
        startImgX = imgX; startImgY = imgY;
    };
    window.onmousemove = e => {
        if (isDragging) {
            imgX = startImgX + ((e.clientX + window.scrollX - fixedRectLeft) * fixedScaleS - startX);
            imgY = startImgY + ((e.clientY + window.scrollY - fixedRectTop) * fixedScaleS - startY);
            draw();
        }
    };
    window.onmouseup = () => isDragging = false;
    canvas.addEventListener('touchstart', e => {
        if (!userImg) return;
        updateCanvasRect();
        if (e.touches.length === 1) {
            isDragging = true;
            startX = (e.touches[0].clientX + window.scrollX - fixedRectLeft) * fixedScaleS;
            startY = (e.touches[0].clientY + window.scrollY - fixedRectTop) * fixedScaleS;
            startImgX = imgX; startImgY = imgY;
        } else if (e.touches.length === 2) {
            initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            startScale = imgScale;
        }
    });
    canvas.addEventListener('touchmove', e => {
        if (!userImg) return;
        e.preventDefault();
        if (e.touches.length === 1 && isDragging) {
            imgX = startImgX + ((e.touches[0].clientX + window.scrollX - fixedRectLeft) * fixedScaleS - startX);
            imgY = startImgY + ((e.touches[0].clientY + window.scrollY - fixedRectTop) * fixedScaleS - startY);
        } else if (e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            imgScale = startScale * (d / initialDist);
        }
        draw();
    });

    document.getElementById('strongData').oninput = draw;
    window.addEventListener('resize', updateCanvasRect);
    draw();
</script>
</body>
</html>
